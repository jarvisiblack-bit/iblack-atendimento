<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>iBlack — Atendimento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif}
.page{max-width:500px;margin:0 auto;padding:0 16px 48px}
.header{text-align:center;padding:44px 0 24px}
.logo{color:#fff;font-size:34px;font-weight:800;letter-spacing:6px;font-family:'Helvetica Neue','Arial Black',sans-serif}
.logo em{color:#444;font-style:normal}
.subtitle{color:#444;font-size:12px;letter-spacing:3px;margin-top:6px;text-transform:uppercase}
.time-row{display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:5px 14px;font-size:12px}
.badge-time{background:#0f0f0f;border:0.5px solid #222;color:#666}
.badge-online{background:rgba(16,185,129,0.07);border:0.5px solid rgba(16,185,129,0.22);color:#34D399}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-on{background:#10B981}
.dot-off{background:#2a2a2a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulsing{animation:pulse 2s infinite}
.section-label{color:#2a2a2a;font-size:10px;letter-spacing:3px;text-align:center;margin:22px 0 12px;text-transform:uppercase}
.cards{display:flex;flex-direction:column;gap:9px}
.card{display:flex;align-items:center;border-radius:14px;padding:14px 14px;text-decoration:none;transition:transform .15s}
.card:active{transform:scale(.98)}
.card-on{background:#0f0f0f;border:0.5px solid #232323}
.card-off{background:#080808;border:0.5px solid #111;opacity:.38}
.info{flex:1;min-width:0;margin-left:12px}
.nome{font-size:15px;font-weight:600;color:#fff;line-height:1.2}
.card-off .nome{color:#444}
.meta{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}
.loja-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;letter-spacing:.5px}
.status{font-size:11px;color:#3a3a3a}
.card-on .status{color:#555}
.wa-btn{flex-shrink:0;margin-left:10px;background:#1A8A38;border-radius:10px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;text-decoration:none}
.footer{text-align:center;margin-top:36px;color:#1c1c1c;font-size:10px;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">i<em>BLACK</em></div>
    <div class="subtitle">Fale com nossa equipe</div>
    <div class="time-row">
      <div class="badge badge-time"><div class="dot dot-on pulsing"></div><span id="clock">--:--</span></div>
      <div class="badge badge-online" id="badge-online" style="display:none"><span id="online-txt"></span></div>
    </div>
  </div>
  <div id="section-on" class="section-label" style="display:none">Atendendo agora</div>
  <div id="cards-on" class="cards"></div>
  <div id="section-off" class="section-label" style="display:none">Fora do horário</div>
  <div id="cards-off" class="cards"></div>
</div>
<div class="footer">Rotação automática iBlack</div>
<script>
var LOJA={"Akash":{c:"#60A5FA",bg:"rgba(59,130,246,0.10)"},"Matriz":{c:"#A78BFA",bg:"rgba(139,92,246,0.10)"},"Catuaí":{c:"#34D399",bg:"rgba(16,185,129,0.10)"}};
var V=[
{id:1,nome:"Thaysson",loja:"Akash",ativo:true,wa:"https://wa.me/5544997104306?text=Ol%C3%A1%2C+vim+pelo+site+iBlack%21",ag:{1:"10:00-18:00",2:"10:00-18:00",3:"10:00-18:00",4:"10:00-18:00",5:"10:00-18:00",6:"10:00-18:00"}},
{id:2,nome:"Leonardo",loja:"Akash",ativo:false,wa:"",ag:{1:"10:00-18:00",2:"10:00-18:00",3:"10:00-18:00",4:"10:00-18:00",5:"10:00-18:00",6:"10:00-18:00"}},
{id:3,nome:"Horácio",loja:"Akash",ativo:false,wa:"",ag:{1:"11:45-20:00",2:"11:45-20:00",3:"11:45-20:00",4:"11:45-20:00",5:"11:45-20:00",6:"10:00-18:00"}},
{id:4,nome:"Leticia",loja:"Akash",ativo:true,wa:"https://wa.me/message/HHZOJMTVWNZUO1",ag:{1:"11:45-20:00",2:"11:45-20:00",3:"11:45-20:00",4:"11:45-20:00",5:"11:45-20:00",6:"10:00-18:00"}},
{id:5,nome:"Matheus",loja:"Matriz",ativo:true,wa:"https://wa.me/5544999846211?text=Ol%C3%A1%2C+vim+pelo+site+iBlack%21",ag:{1:"09:00-18:00",2:"09:00-18:00",3:"09:00-18:00",4:"09:00-18:00",5:"09:00-18:00",6:"09:00-13:00"}},
{id:6,nome:"Maria",loja:"Matriz",ativo:true,wa:"https://wa.me/554498799837?text=Ol%C3%A1%2C+vim+pelo+site+iBlack%21",ag:{1:"09:00-18:00",2:"09:00-18:00",3:"09:00-18:00",4:"09:00-18:00",5:"09:00-18:00",6:"09:00-13:00"}},
{id:7,nome:"Luan",loja:"Matriz",ativo:true,wa:"https://wa.me/message/QQWPF2ZNFKRSO1",ag:{1:"09:00-18:00",2:"09:00-18:00",3:"09:00-18:00",4:"09:00-18:00",5:"09:00-18:00",6:"09:00-13:00"}},
{id:8,nome:"Fernando",loja:"Catuaí",ativo:true,wa:"https://wa.me/5544997516444?text=Ol%C3%A1%2C+vim+pelo+site+iBlack%21",ag:{0:"13:00-19:00",1:"10:00-18:05",2:"10:00-18:05",3:"10:00-18:05",4:"10:00-18:05",5:"10:00-18:05",6:"10:00-18:05"}},
{id:9,nome:"Luis",loja:"Catuaí",ativo:true,wa:"https://wa.me/message/RT6EBZBCKCG4O1",ag:{1:"13:45-22:00",2:"13:45-22:00",3:"13:45-22:00",4:"13:45-22:00",5:"13:45-22:00",6:"13:45-22:00"}},
{id:10,nome:"Sabrina",loja:"Catuaí",ativo:true,wa:"https://wa.me/message/SE26R6R2Q6JPO1",ag:{0:"13:00-19:00",1:"13:45-22:00",2:"13:45-22:00",3:"13:45-22:00",4:"13:45-22:00",5:"13:45-22:00",6:"13:45-22:00"}},
{id:11,nome:"Pedro",loja:"Catuaí",ativo:true,wa:"https://wa.me/5544997393914?text=Ol%C3%A1%2C+vim+pelo+site+iBlack%21",ag:{1:"11:00-20:00",2:"11:00-20:00",3:"11:00-20:00",4:"11:00-20:00",5:"11:00-20:00",6:"11:00-20:00"}},
];
function toMins(s){var p=s.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function getStatus(v,now){var day=now.getDay(),mins=now.getHours()*60+now.getMinutes();var shift=v.ag[day];if(!shift){for(var d=1;d<=7;d++){var nd=(day+d)%7;if(v.ag[nd])return{type:"off",label:"volta "+v.ag[nd].split("-")[0]};}return{type:"off",label:"folga"};}var parts=shift.split("-"),s=toMins(parts[0]),e=toMins(parts[1]);if(mins>=s&&mins<e)return{type:"on",label:"até "+parts[1]};if(mins<s)return{type:"later",label:"entra "+parts[0]};return{type:"done",label:"encerrou"};}
function rotate(arr,n){if(!arr.length)return arr;var o=((n%arr.length)+arr.length)%arr.length;return arr.slice(o).concat(arr.slice(0,o));}
function render(){var now=new Date();var h=now.getHours(),m=now.getMinutes();document.getElementById("clock").textContent=(h<10?"0":"")+h+":"+(m<10?"0":"")+m;var ativos=V.filter(function(v){return v.ativo;});var withSt=ativos.map(function(v){return Object.assign({},v,{st:getStatus(v,now)});});var active=withSt.filter(function(v){return v.st.type==="on";});var inactive=withSt.filter(function(v){return v.st.type!=="on";});var rotated=rotate(active,h);var bo=document.getElementById("badge-online");if(active.length){bo.style.display="inline-flex";document.getElementById("online-txt").textContent=active.length+" vendedor"+(active.length>1?"es":"")+" online";}else{bo.style.display="none";}document.getElementById("section-on").style.display=active.length?"block":"none";document.getElementById("section-off").style.display=inactive.length?"block":"none";document.getElementById("cards-on").innerHTML=rotated.map(function(v){return cardHTML(v,true);}).join("");document.getElementById("cards-off").innerHTML=inactive.map(function(v){return cardHTML(v,false);}).join("");}
function cardHTML(v,on){var ls=LOJA[v.loja]||{c:"#888",bg:"rgba(128,128,128,0.1)"};var badge='<span class="loja-badge" style="color:'+ls.c+';background:'+ls.bg+'">'+v.loja+'</span>';var dot='<div class="dot '+(on?"dot-on pulsing":"dot-off")+'"></div>';var btn=on?'<a class="wa-btn" href="'+v.wa+'" target="_blank">Falar</a>':"";return'<div class="card '+(on?"card-on":"card-off")+'">'+dot+'<div class="info"><div class="nome">'+v.nome+'</div>'+'<div class="meta">'+badge+'<span class="status">'+v.st.label+'</span></div></div>'+btn+'</div>';}
render();setInterval(render,30000);
</script>
</body>
</html>
