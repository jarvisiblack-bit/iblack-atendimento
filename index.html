<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif}

/* HERO */
.hero{position:relative;height:230px;overflow:hidden;background:#000}
.hero-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease}
.hero-slide.on{opacity:1}
.hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.52);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;padding:20px}
.hero-logo{width:100px;height:100px;object-fit:cover;border-radius:16px}
.hero-tag{color:rgba(255,255,255,.45);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;margin-top:8px}
.dots{display:flex;gap:5px;margin-top:10px}
.dot-slide{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .4s}
.dot-slide.on{background:#fff}

/* CONTEÚDO */
.page{max-width:500px;margin:0 auto;padding:0 14px 48px}
.badge-row{display:flex;justify-content:center;gap:8px;margin:16px 0 0;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:11px}
.bt{background:#111;border:.5px solid #222;color:#555}
.bon{background:rgba(16,185,129,.07);border:.5px solid rgba(16,185,129,.2);color:#34D399}
.bdot{width:6px;height:6px;border-radius:50%}
.don{background:#10B981}.doff{background:#EF4444}.dyellow{background:#F59E0B}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.p{animation:pulse 2s infinite}
.sec{color:#2a2a2a;font-size:10px;letter-spacing:3px;text-align:center;margin:20px 0 10px;text-transform:uppercase}
.cards{display:flex;flex-direction:column;gap:9px}
.card{display:flex;align-items:center;border-radius:14px;padding:12px 14px;text-decoration:none;transition:transform .15s}
.card:active{transform:scale(.98)}
.con{background:#0f0f0f;border:.5px solid #1e1e1e}
.coff{background:#0a0a0a;border:.5px solid #141414}
.av{width:46px;height:46px;border-radius:50%;flex-shrink:0;object-fit:cover;border:2px solid #1a1a1a}
.av-on{border-color:#1a3a1a}.av-off{border-color:#1a1a1a;opacity:.55;filter:grayscale(40%)}
.av-init{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;background:#1a0808;border:2px solid #cc2200}
.info{flex:1;margin-left:12px}
.nome{font-size:15px;font-weight:600;color:#fff;line-height:1.2}
.coff .nome{color:#444}
.strow{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.stxt{font-size:11px}
.son{color:#555}.soff{color:#EF4444;font-weight:600}.splantao{color:#F59E0B;font-weight:600}
.lpill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.wbtn{flex-shrink:0;border-radius:9px;padding:7px 12px;font-size:11px;font-weight:700;white-space:nowrap;text-decoration:none;margin-left:8px}
.won{background:#1A8A38;color:#fff}.woff{background:#1a1010;color:#EF4444;border:.5px solid #2a1a1a}
.cplantao{background:#0f0e08;border:.5px solid #2a2200}
.av-plantao{border-color:#3a2e00;opacity:.9}
.wplantao{background:#2a2000;color:#F59E0B;border:.5px solid #3a3000}

/* OUTROS CANAIS */
.outros-sep{display:flex;align-items:center;gap:10px;margin:24px 0 10px}
.outros-sep::before,.outros-sep::after{content:'';flex:1;height:.5px;background:#1e1e1e}
.outros-label{font-size:10px;letter-spacing:2px;color:#333;text-transform:uppercase;white-space:nowrap}
.card-outro{display:flex;align-items:center;border-radius:12px;padding:10px 12px;text-decoration:none;background:#080808;border:.5px solid #181818;transition:transform .15s}
.card-outro:active{transform:scale(.98)}
.av-outro{width:40px;height:40px;border-radius:50%;flex-shrink:0;object-fit:cover;border:1.5px solid #222}
.av-outro-on{border-color:#1a3a1a}
.nome-outro{font-size:13px;font-weight:600;color:#aaa}
.role-outro{font-size:10px;color:#444;margin-top:1px}
.wbtn-outro{flex-shrink:0;border-radius:8px;padding:6px 10px;font-size:10px;font-weight:700;white-space:nowrap;text-decoration:none;margin-left:8px}
.outro-on{background:#0e2a1a;color:#34D399;border:.5px solid #1a4a2a}
.outro-off{background:#150a0a;color:#444;border:.5px solid #1a1a1a}

.footer{text-align:center;margin-top:28px;color:#1c1c1c;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding-bottom:10px}
</style>

  if(v.plantao){
    const plantaoStart=22*60+1,plantaoEnd=8*60+59;
    const inPlantaoTime=mins>=plantaoStart||mins<=plantaoEnd;
    if(inPlantaoTime){
      const relevantDay=mins<=plantaoEnd?(day===0?6:day-1):day;
      if(v.plantao[relevantDay])return{on:false,plantao:true,lbl:'Plantão'};
    }
  }
  const sh=v.ag[day];
  if(!sh){for(let d=1;d<=7;d++){const nd=(day+d)%7;if(v.ag[nd])return{on:false,plantao:false,lbl:'Offline — volta '+v.ag[nd].split('-')[0]};}return{on:false,plantao:false,lbl:'Offline'};}
  const[si,sf]=sh.split('-'),s=toM(si),e=toM(sf);
  if(mins>=s&&mins<e)return{on:true,plantao:false,lbl:'Online até '+sf};
  if(mins<s)return{on:false,plantao:false,lbl:'Disponível às '+si};
  return{on:false,plantao:false,lbl:'Offline hoje'};
}
function rotate(arr,n){if(!arr.length)return arr;const o=((n%arr.length)+arr.length)%arr.length;return[...arr.slice(o),...arr.slice(0,o)];}

function cardVendor(v){
  const lc=LC[v.loja]||'#888',lb=LB[v.loja]||'rgba(128,128,128,0.1)';
  const st=v.st;
  let avClass,cardClass,btnClass,stxtClass,dotClass;
  if(st.on){avClass='av av-on';cardClass='card con';btnClass='wbtn won';stxtClass='stxt son';dotClass='bdot don p';}
  else if(st.plantao){avClass='av av-plantao';cardClass='card cplantao';btnClass='wbtn wplantao';stxtClass='stxt splantao';dotClass='bdot dyellow p';}
  else{avClass='av av-off';cardClass='card coff';btnClass='wbtn woff';stxtClass='stxt soff';dotClass='bdot doff';}
  const img=v.foto&&F[v.foto]
    ?'<img src="'+F[v.foto]+'" class="'+avClass+'" alt="'+v.nome+'">'
    :'<div class="av '+(st.on?'av-on':st.plantao?'av-plantao':'av-off')+'" style="background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#555">'+v.nome[0]+'</div>';
  const btnLabel=st.on?'Falar':st.plantao?'Plantão':'Offline';
  return'<a class="'+cardClass+'" href="'+(v.wa||'#')+'" target="'+(v.wa?'_blank':'_self')+'" onclick="typeof gtag!==\'undefined\'&&gtag(\'event\',\'click_vendedor\',{vendedor:v.nome,loja:v.loja})">'+img+'<div class="info"><div class="nome">'+v.nome+'</div><div class="strow"><div class="'+dotClass+'"></div><span class="'+stxtClass+'">'+st.lbl+'</span><span class="lpill" style="color:'+lc+';background:'+lb+'">'+v.loja+'</span></div></div><span class="'+btnClass+'">'+btnLabel+'</span></a>';
}
function cardOutro(v){
  const img=v.foto&&F[v.foto]
    ?`<img src="${F[v.foto]}" class="av-outro ${v.st.on?'av-outro-on':''}" alt="${v.nome}">`
    :`<div class="av-init" style="width:40px;height:40px;font-size:14px">${v.nome[0]}</div>`;
  return`<a class="card-outro" href="${v.wa}" target="_blank" onclick="typeof gtag!=='undefined'&&gtag('event','click_canal',{canal:v.nome,funcao:v.role} | ${v.role}\`})">
    ${img}<div class="info" style="margin-left:10px">
      <div class="nome-outro">${v.nome}</div>
      <div class="role-outro">${v.role}</div>
    </div>
    <span class="wbtn-outro ${v.st.on?'outro-on':'outro-off'}">${v.st.on?'Chamar':'Offline'}</span>
  </a>`;
}

function render(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  document.getElementById('clk').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  const ativos=V.filter(v=>v.ativo).map(v=>({...v,st:getStatus(v,now)}));
  const on=ativos.filter(v=>v.st.on);
  const plantao=ativos.filter(v=>!v.st.on&&v.st.plantao);
  const off=ativos.filter(v=>!v.st.on&&!v.st.plantao);
  const bon=document.getElementById('bon');
  if(on.length){bon.style.display='inline-flex';document.getElementById('cnt').textContent=on.length+' online agora';}
  else bon.style.display='none';
  document.getElementById('sec-on').style.display=on.length?'block':'none';
  document.getElementById('sec-plantao').style.display=plantao.length?'block':'none';
  document.getElementById('sec-off').style.display=off.length?'block':'none';
  const rotIdx=Math.floor((h*60+m)/10);
  document.getElementById('cd-on').innerHTML=rotate(on,rotIdx).map(cardVendor).join('');
  document.getElementById('cd-plantao').innerHTML=plantao.map(cardVendor).join('');
  document.getElementById('cd-off').innerHTML=off.map(cardVendor).join('');
  const outros=OUTROS.map(v=>({...v,st:getStatus(v,now)}));
  document.getElementById('cd-outros').innerHTML=outros.map(cardOutro).join('');
}
render();
setInterval(render,30000);
</script>
